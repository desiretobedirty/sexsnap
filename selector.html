      cursor: pointer;
      background: #00c853;
      color: white;

  // =========================

  const imageElement = document.getElementById("slideshow");
  const button = document.getElementById("toggleButton");

  // =========================
  // PRELOAD IMAGES
  // =========================

  const cachedImages = [];

  function preloadImages() {

    images.forEach((src, index) => {

      const img = new Image();

      img.src = src;

      img.onload = () => {
        console.log("Loaded:", src);

        // Show first image once loaded
        if (index === 0) {
          imageElement.src = src;
        }
      };

      img.onerror = () => {
        console.warn("Failed to load:", src);
      };

      cachedImages.push(img);

    });

  }

  preloadImages();

  // =========================
  // RANDOM NON-REPEATING SYSTEM
  // =========================

  let running = true;

  let shuffledImages = [];
  let currentIndex = 0;
  let lastImage = null;

  // Fisher-Yates Shuffle
  function shuffleArray(array) {

    const shuffled = [...array];

    for (let i = shuffled.length - 1; i > 0; i--) {

      const j = Math.floor(Math.random() * (i + 1));

      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    return shuffled;
  }

  // Create new shuffled cycle
  function createNewShuffle() {

    shuffledImages = shuffleArray(cachedImages);

    // Prevent same image repeating
    // between cycles
    if (
      lastImage &&
      shuffledImages.length > 1 &&
      shuffledImages[0].src === lastImage.src
    ) {

      [shuffledImages[0], shuffledImages[1]] =
      [shuffledImages[1], shuffledImages[0]];
    }

    currentIndex = 0;
  }

  createNewShuffle();

  // =========================
  // SLIDESHOW LOOP
  // =========================

  setInterval(() => {

    if (!running) return;

    // Reshuffle after all images shown
    if (currentIndex >= shuffledImages.length) {

      lastImage = shuffledImages[shuffledImages.length - 1];

      createNewShuffle();
    }

    // Instant cached image swap
    imageElement.src = shuffledImages[currentIndex].src;

    currentIndex++;

  }, speed);

  // =========================
  // BUTTON CONTROL
  // =========================

  button.addEventListener("click", () => {

    running = !running;

    if (running) {

      button.textContent = "STOP";
      button.classList.remove("stopped");

    } else {

      button.textContent = "START";
      button.classList.add("stopped");
    }

  });

  // =========================
  // SPACEBAR SUPPORT
  // =========================

  document.addEventListener("keydown", (event) => {

    if (event.code === "Space") {

      event.preventDefault();

      button.click();
    }

  });
