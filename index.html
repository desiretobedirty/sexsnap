<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sex Snap</title>

<style>
  :root {
    --bg: #050510;
    --pink: #ff2d95;
    --purple: #a855ff;
    --glow:
      0 0 18px rgba(255, 0, 180, 0.7),
      0 0 32px rgba(168, 85, 255, 0.5);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background:
      radial-gradient(
        circle at top,
        #1a0033,
        #050510 60%,
        #000 100%
      );

    font-family:
      Arial,
      Helvetica,
      sans-serif;

    color: white;

    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 1400px;

    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 0.08em;

    margin-bottom: 24px;

    color: var(--pink);
    text-shadow: var(--glow);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 640px);
    gap: 24px;
  }

  .grid img {
    width: 640px;
    height: 360px;

    object-fit: cover;

    border-radius: 14px;

    border: 2px solid rgba(255,255,255,0.12);

    box-shadow:
      0 0 20px rgba(168, 85, 255, 0.35);

    transition:
      opacity 0.12s ease,
      transform 0.12s ease;
  }

  .grid img:hover {
    transform: scale(1.01);
  }

  .flash {
    opacity: 0.25;
  }

  button {
    margin-top: 24px;

    padding: 16px 40px;

    border: none;
    border-radius: 999px;

    cursor: pointer;

    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;

    color: white;

    background:
      linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
      );

    box-shadow: var(--glow);

    transition:
      transform 0.15s ease,
      opacity 0.15s ease;
  }

  button:hover {
    opacity: 0.95;
  }

  button:active {
    transform: scale(0.96);
  }

  .footer {
    margin-top: 18px;

    text-align: center;

    opacity: 0.7;

    line-height: 1.5;
  }

  @media (max-width: 1350px) {

    .grid {
      grid-template-columns: 1fr;
    }

    .grid img {
      width: 100%;
      max-width: 640px;
      height: 360px;
    }
  }
</style>
</head>

<body>

<div class="app">

  <div class="grid">
    <img id="leftImage" alt="Left Image">
    <img id="rightImage" alt="Right Image">
  </div>

  <button id="refreshBtn">
    Refresh
  </button>

  <p class="footer">
    If both cards match, first person to shout “SEX” decides the next move, 'Sex or Refresh'.
  </p>

</div>

<script>
  const IMAGES = [
"images/bodyguard_01.webp",
"images/bodyguard_02.webp",
"images/bull_01.webp",
"images/bull_02.webp",
"images/butterfly_01.webp",
"images/butterfly_02.webp",
"images/butterfly_03.webp",
"images/butterfly_04.webp",
"images/cowgirl_01.webp",
"images/cowgirl_02.webp",
"images/cowgirl_03.webp",
"images/cowgirl_04.webp",
"images/cowgirl_05.webp",
"images/crab_01.webp",
"images/cradle_01.webp",
"images/cradle_02.webp",
"images/cradle_03.webp",
"images/dancer_01.webp",
"images/dancer_02.webp",
"images/doggy_01.webp",
"images/doggy_02.webp",
"images/doggy_03.webp",
"images/doggy_04.webp",
"images/doggy_05.webp",
"images/doggy_06.webp",
"images/doggy_07.webp",
"images/groundhog_01.webp",
"images/groundhog_02.webp",
"images/groundhog_03.webp",
"images/guard_01.webp",
"images/guard_02.webp",
"images/guard_03.webp",
"images/lapdance_01.webp",
"images/lapdance_02.webp",
"images/lapdance_03.webp",
"images/lotus_01.webp",
"images/missionary_01.webp",
"images/missionary_02.webp",
"images/missionary_03.webp",
"images/missionary_04.webp",
"images/missionary_05.webp",
"images/missionary_06.webp",
"images/missionary_07.webp",
"images/rodeo_01.webp",
"images/rodeo_02.webp",
"images/saint_01.webp",
"images/scissors_01.webp",
"images/scissors_02.webp",
"images/sinner_01.webp",
"images/spoons_01.webp",
"images/spoons_02.webp",
"images/spoons_03.webp"
  ];

  const START_IMAGE = "images/ss.webp";

  // 1 in 12 chance of a match
  const MATCH_ODDS = 12;

  const leftImage =
    document.getElementById("leftImage");

  const rightImage =
    document.getElementById("rightImage");

  const refreshBtn =
    document.getElementById("refreshBtn");

  let previous = {
    left: -1,
    right: -1
  };

  // Show starting image immediately
  leftImage.src = START_IMAGE;
  rightImage.src = START_IMAGE;

  // Preload images
  [START_IMAGE, ...IMAGES].forEach(src => {
    const img = new Image();
    img.src = src;
  });

  function randomIndex() {
    return Math.floor(
      Math.random() * IMAGES.length
    );
  }

  function getNewIndex(excluded) {
    let i;

    do {
      i = randomIndex();
    } while (i === excluded);

    return i;
  }

  function flash() {
    leftImage.classList.add("flash");
    rightImage.classList.add("flash");

    setTimeout(() => {
      leftImage.classList.remove("flash");
      rightImage.classList.remove("flash");
    }, 120);
  }

  function refreshImages() {

    const leftIndex =
      getNewIndex(previous.left);

    const shouldMatch =
      Math.floor(
        Math.random() * MATCH_ODDS
      ) === 0;

    let rightIndex;

    if (shouldMatch) {

      rightIndex = leftIndex;

    } else {

      const pool = IMAGES
        .map((_, i) => i)
        .filter(i =>
          i !== leftIndex &&
          i !== previous.right
        );

      rightIndex =
        pool[
          Math.floor(
            Math.random() * pool.length
          )
        ];
    }

    previous = {
      left: leftIndex,
      right: rightIndex
    };

    leftImage.src = IMAGES[leftIndex];
    rightImage.src = IMAGES[rightIndex];

    flash();
  }

  refreshBtn.addEventListener(
    "click",
    refreshImages
  );
</script>

</body>
</html>
